<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimum Age 21+</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .page {
      width: 100%;
      max-width: 420px;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .lock-icon {
      width: 72px;
      height: 72px;
      background: #1a1a1a;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .lock-icon svg {
      width: 36px;
      height: 36px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: clamp(26px, 8vw, 34px);
      font-weight: 900;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: #fff;
      border: 1.5px solid #333;
      border-radius: 14px;
      padding: 15px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { border-color: #555; background: #111; }
    .btn-back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="lock-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Minimum Age: 21+</h1>
  <p>This offer is only available to users who are 21 years of age or older.</p>

  <a href="age-gate.html" class="btn-back" id="btn-back">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Go Back
  </a>

</div>
<script>
(function(){
  var qs = window.location.search;
  if(qs){ document.getElementById('btn-back').href = 'age-gate.html' + qs; }
})();
</script>
</body>
</html>
