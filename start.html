<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body{background:#fff;margin:0}</style>
<script>
(function(){
  var u = navigator.userAgent.toLowerCase(),
      b = ['tiktok','bytespider','facebookexternalhit','googlebot','bingbot'];
  
  // Check if the visitor is a bot from the list above
  if (b.some(function(x) { return u.indexOf(x) > -1 })) {
    // Redirect bots to the safe page
    location.replace('home.html' + window.location.search);
  } else {
    // Redirect normal users to the age gate
    location.replace('age-gate.html' + window.location.search);
  }
})();
</script>
</head>

</html>
